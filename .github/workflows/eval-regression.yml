name: Eval Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/finrag_eval/retrieval/**'
      - 'src/finrag_eval/synthesis/**'
      - 'src/finrag_eval/eval/**'
      - 'data/qa_dataset/**'

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-smoke:
    name: Smoke Eval (sample QA pairs)
    runs-on: ubuntu-latest
    # Only run if PR has the 'run-eval' label OR touches eval-critical paths
    if: |
      contains(github.event.pull_request.labels.*.name, 'run-eval') ||
      github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run smoke eval (10 QA pairs)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run finrag eval --smoke --max-questions 10 --output eval-smoke.json

      - name: Compare against baseline
        run: |
          uv run python scripts/compare_eval.py \
            --baseline data/eval_runs/baseline.json \
            --current eval-smoke.json \
            --tolerance 0.05

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.event.pull_request.number }}
          path: |
            eval-smoke.json
            eval-comparison-report.md

      - name: Comment on PR with eval results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('eval-comparison-report.md')) {
              const report = fs.readFileSync('eval-comparison-report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

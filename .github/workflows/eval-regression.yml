name: Eval Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/finrag_eval/eval/**'
      - 'data/qa_dataset/**'
      - 'scripts/verify_qa_pairs.py'

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-pairs-validation:
    name: QA Pairs Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Verify QA pairs schema
        run: uv run python scripts/verify_qa_pairs.py --schema-only
